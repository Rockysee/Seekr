version: '3.8'

services:
  resilience-matrix:
    build: .
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_CLIENT_LOGGER_LEVEL=error
      - STREAMLIT_LOGGER_LEVEL=error
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
